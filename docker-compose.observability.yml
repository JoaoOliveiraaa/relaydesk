# Stack Grafana: Prometheus + Loki + Tempo + Grafana (+ Promtail opcional).
# Uso: docker compose -f docker-compose.observability.yml up -d
# Depois: apontar serviços RelayDesk para Tempo OTLP HTTP — ver README (OTEL_EXPORTER_OTLP_TRACES_ENDPOINT).

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: relaydesk-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.2.0
    container_name: relaydesk-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: relaydesk
      GF_SECURITY_ADMIN_PASSWORD: relaydesk
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:2.9.8
    container_name: relaydesk-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./infra/observability/loki-config.yaml:/etc/loki/local-config.yaml:ro

  tempo:
    image: grafana/tempo:2.5.0
    container_name: relaydesk-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4318:4318"
      - "3200:3200"
    volumes:
      - ./infra/observability/tempo.yaml:/etc/tempo.yaml:ro

  promtail:
    profiles: ["logs"]
    image: grafana/promtail:2.9.8
    container_name: relaydesk-promtail
    restart: unless-stopped
    volumes:
      - ./infra/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
